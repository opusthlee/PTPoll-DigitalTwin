<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTPoll Project Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');
        body { font-family: 'Outfit', sans-serif; background-color: #0b0f1a; color: #e2e8f0; height: 100vh; overflow: hidden; }
        .glass-card { background: rgba(22, 28, 45, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); border-radius: 1.5rem; }
        .sidebar-title { background: linear-gradient(135deg, #3b82f6 0%, #2dd4bf 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .chart-toggle { border: 1px solid rgba(148, 163, 184, 0.2); color: #94a3b8; background: rgba(15, 23, 42, 0.65); }
        .chart-toggle.active { border-color: rgba(59, 130, 246, 0.8); color: #dbeafe; background: rgba(37, 99, 235, 0.22); }
    </style>
</head>
<body class="p-6">
    <div class="grid grid-cols-12 gap-6 h-full">
        <!-- Sidebar -->
        <aside class="col-span-3 flex flex-col gap-6 h-full overflow-hidden">
            <div class="glass-card p-6 border-l-4 border-blue-500">
                <h1 id="projectTitle" class="text-xl font-bold sidebar-title mb-1 leading-tight">Project Hub</h1>
                <p class="text-[9px] text-slate-500 uppercase tracking-[0.3em] font-bold mb-6">Intelligence Engine</p>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] text-slate-500 block mb-1 uppercase font-bold tracking-widest">Region</label>
                        <select id="regSelect" onchange="runSimulation('region')" class="w-full bg-slate-800 border border-white/10 rounded-xl px-3 py-2 text-sm outline-none focus:border-blue-500">
                            <option value="전국" selected>전국 (Baseline)</option><option value="서울">서울 (Metro)</option><option value="종로구">종로구 (Local)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 block mb-1 uppercase font-bold tracking-widest">Age Group</label>
                        <select id="ageSelect" onchange="runSimulation('age')" class="w-full bg-slate-800 border border-white/10 rounded-xl px-3 py-2 text-sm outline-none focus:border-blue-500">
                            <option value="전체 연령" selected>전체 연령</option><option value="20대">20대</option><option value="30대">30대</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 block mb-1 uppercase font-bold tracking-widest">Gender</label>
                        <select id="genSelect" onchange="runSimulation('gender')" class="w-full bg-slate-800 border border-white/10 rounded-xl px-3 py-2 text-sm outline-none focus:border-blue-500">
                            <option value="전체 성별" selected>전체 성별</option><option value="남성">남성</option><option value="여성">여성</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-500 block mb-2 uppercase font-bold tracking-widest text-blue-400">Impact (<span id="impactVal">0</span>%)</label>
                        <input type="range" id="impactSlider" min="-50" max="50" value="0" oninput="document.getElementById('impactVal').innerText=this.value" class="w-full accent-blue-400">
                    </div>
                    <button onclick="runSimulation('btn')" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold text-xs shadow-xl active:scale-95 transition-all">Execute Analysis</button>
                </div>
            </div>
            <div class="glass-card p-6 flex-grow flex flex-col overflow-hidden border-t border-white/5">
                <h2 class="text-[10px] font-bold text-slate-500 uppercase mb-3 tracking-widest">Analytical Engine Logs</h2>
                <div id="logContent" class="flex-grow overflow-auto text-[10px] text-slate-500 font-mono space-y-0.5 bg-black/20 p-3 rounded-xl"></div>
            </div>
        </aside>

        <!-- Main Area -->
        <main class="col-span-9 flex flex-col gap-6 h-full overflow-hidden">
            <div class="grid grid-cols-2 gap-6 h-2/3">
                <div class="glass-card p-6 flex flex-col">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Simulated Projection</h3>
                    <div class="flex-grow relative"><canvas id="supportChart"></canvas></div>
                </div>
                <div class="glass-card p-6 flex flex-col">
                    <div class="flex items-start justify-between gap-4 mb-3">
                        <div>
                            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest"><span id="trendTargetName" class="text-blue-400">전국</span> Trend Trajectory</h3>
                            <p id="trendSummary" class="text-[10px] text-slate-500 mt-1">주요 정당 중심</p>
                        </div>
                        <div class="flex shrink-0 overflow-hidden rounded-lg">
                            <button id="mainTrendBtn" onclick="setTrendView('main')" class="chart-toggle active px-3 py-1.5 text-[10px] font-bold uppercase">주요</button>
                            <button id="minorTrendBtn" onclick="setTrendView('minor')" class="chart-toggle px-3 py-1.5 text-[10px] font-bold uppercase">소수·기타</button>
                            <button id="allTrendBtn" onclick="setTrendView('all')" class="chart-toggle px-3 py-1.5 text-[10px] font-bold uppercase">전체</button>
                        </div>
                    </div>
                    <div class="flex-grow relative"><canvas id="trendChart"></canvas></div>
                </div>
            </div>
            <div class="glass-card p-6 flex-grow flex flex-col overflow-hidden">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Structural Momentum Analysis</h2>
                <div id="momentumList" class="grid grid-cols-3 gap-4 overflow-auto"></div>
            </div>
        </main>
    </div>

    <script>
        let barChart, trendChart, lastActiveType = 'region';
        let trendView = 'main';
        let lastTrendData = null;
        let lastSimulationData = null;
        const MINOR_THRESHOLD = 3;
        const RECENT_POINTS = 24;
        const SERIES_COLORS = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#a855f7', '#14b8a6', '#f97316', '#e879f9'];
        const RESIDUAL_LABELS = ['기타', '기타정당', '지지정당 없음', '모름/ 무응답', '모름/무응답', 'positive', 'negative'];

        function log(msg, isError = false) {
            const el = document.getElementById('logContent');
            const div = document.createElement('div');
            div.className = isError ? 'text-red-400 font-bold' : '';
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            el.appendChild(div);
            el.scrollTop = el.scrollHeight;
        }

        async function init() {
            const projResp = await fetch('/api/project');
            const project = await projResp.json();
            document.getElementById('projectTitle').innerText = project.title;
            const metaResp = await fetch('/api/meta');
            const meta = await metaResp.json();
            populateSelect('regSelect', meta.REGION, '전국', { '전국': '전국 (Baseline)', '서울': '서울 (Metro)' });
            populateSelect('ageSelect', meta.AGE, null);
            populateSelect('genSelect', meta.GENDER, null);
            initCharts();
            await runSimulation('region');
        }

        function populateSelect(id, values = [], preferred, labelMap = {}) {
            const select = document.getElementById(id);
            const clean = [...new Set(values)].filter(Boolean);
            select.innerHTML = '';
            if (!clean.length) {
                const option = document.createElement('option');
                option.value = '';
                option.textContent = '분석 가능 데이터 없음';
                option.disabled = true;
                option.selected = true;
                select.appendChild(option);
                return;
            }
            clean.forEach(value => {
                const option = document.createElement('option');
                option.value = value;
                option.textContent = labelMap[value] || value;
                select.appendChild(option);
            });
            if (preferred && clean.includes(preferred)) select.value = preferred;
        }

        const stackedValueLabels = {
            id: 'stackedValueLabels',
            afterDatasetsDraw(chart) {
                const { ctx, chartArea } = chart;
                const threshold = chart.options.plugins.stackedValueLabels?.threshold ?? 4;
                ctx.save();
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = '700 10px Outfit, sans-serif';

                chart.data.datasets.forEach((dataset, datasetIndex) => {
                    const meta = chart.getDatasetMeta(datasetIndex);
                    if (meta.hidden) return;
                    meta.data.forEach((bar, index) => {
                        const value = toNumber(dataset.data[index]);
                        if (!Number.isFinite(value) || value < threshold) return;

                        const props = bar.getProps(['x', 'y', 'base', 'width'], true);
                        const height = Math.abs(props.base - props.y);
                        if (height < 16 || props.y < chartArea.top || props.base > chartArea.bottom + 1) return;

                        ctx.fillStyle = value >= 12 ? '#f8fafc' : '#dbeafe';
                        ctx.fillText(value.toFixed(value >= 10 ? 0 : 1), props.x, props.y + height / 2);
                    });
                });
                ctx.restore();
            }
        };

        function initCharts() {
            const opt = {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 24, usePointStyle: true }
                    },
                    tooltip: {
                        filter: (item) => item.raw !== null && item.raw !== undefined,
                        callbacks: {
                            label: (ctx) => {
                                const y = ctx.parsed.y;
                                return `${ctx.dataset.label}: ${Number.isFinite(y) ? y.toFixed(1) : '-'}%`;
                            }
                        }
                    },
                    stackedValueLabels: { threshold: 4 }
                },
                scales: {
                    x: { stacked: true, ticks: { color: '#64748b', maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }, grid: { color: 'rgba(148, 163, 184, 0.06)' } },
                    y: { stacked: true, beginAtZero: true, suggestedMax: 100, ticks: { color: '#64748b', callback: (v) => `${v}%` }, grid: { color: 'rgba(148, 163, 184, 0.08)' } }
                },
                elements: { point: { radius: 0, hoverRadius: 4 }, line: { borderWidth: 3 } }
            };
            const projectionOpt = {
                ...opt,
                plugins: {
                    ...opt.plugins,
                    stackedValueLabels: { threshold: 2 }
                }
            };
            barChart = new Chart(document.getElementById('supportChart'), { type: 'bar', data: { labels: [], datasets: [] }, options: projectionOpt, plugins: [stackedValueLabels] });
            trendChart = new Chart(document.getElementById('trendChart'), { type: 'bar', data: { labels: [], datasets: [] }, options: opt, plugins: [stackedValueLabels] });
        }

        function setTrendView(view) {
            trendView = view;
            ['main', 'minor', 'all'].forEach(v => {
                document.getElementById(`${v}TrendBtn`).classList.toggle('active', v === view);
            });
            renderTrendChart();
        }

        function seriesStats(values) {
            const valid = values.map(toNumber).filter(v => Number.isFinite(v));
            const max = valid.length ? Math.max(...valid) : 0;
            const latestValue = values.length ? toNumber(values[values.length - 1]) : null;
            const latest = Number.isFinite(latestValue) ? latestValue : -1;
            return { max, latest, points: valid.length };
        }

        function toNumber(value) {
            const n = Number(value);
            return Number.isFinite(n) ? n : null;
        }

        function isResidualSeries(name) {
            return RESIDUAL_LABELS.some(label => name.includes(label));
        }

        function classifySeries(name, values) {
            const stats = seriesStats(values);
            if (isResidualSeries(name)) return 'minor';
            return stats.max < MINOR_THRESHOLD ? 'minor' : 'main';
        }

        function compressLabels(labels) {
            const maxLabels = 12;
            if (labels.length <= maxLabels) return labels;
            const step = Math.ceil(labels.length / maxLabels);
            return labels.map((label, idx) => (idx % step === 0 || idx === labels.length - 1) ? label : '');
        }

        function getVisibleSeries() {
            if (!lastTrendData || !lastSimulationData) return;

            const names = Object.keys(lastTrendData.candidates || {});
            const decorated = names.map(name => {
                const values = lastTrendData.candidates[name].map(toNumber);
                return { name, values, type: classifySeries(name, values), stats: seriesStats(values) };
            }).sort((a, b) => b.stats.latest - a.stats.latest || b.stats.max - a.stats.max);

            const visible = decorated.filter(item => trendView === 'all' || item.type === trendView);
            return { decorated, visible };
        }

        function renderProjectionChart() {
            const series = getVisibleSeries();
            if (!series) return;
            const original = lastSimulationData.original || {};
            const projected = lastSimulationData.simulated || {};

            barChart.data.labels = ['Current', 'Projected'];
            const currentSeries = series.visible.filter(item =>
                Number.isFinite(toNumber(original[item.name])) ||
                Number.isFinite(toNumber(projected[item.name]))
            );
            barChart.data.datasets = currentSeries.map((item, idx) => ({
                label: item.name,
                data: [toNumber(original[item.name]), toNumber(projected[item.name])],
                backgroundColor: item.type === 'minor' ? 'rgba(100, 116, 139, 0.65)' : SERIES_COLORS[idx % SERIES_COLORS.length],
                borderColor: 'rgba(15, 23, 42, 0.4)',
                borderWidth: 1,
                borderRadius: 3
            }));
            barChart.update();
        }

        function renderTrendChart() {
            const series = getVisibleSeries();
            if (!series) return;

            const allDates = lastTrendData.dates || [];
            const start = Math.max(0, allDates.length - RECENT_POINTS);
            const labels = compressLabels(allDates.slice(start).map(d => d.slice(2))).concat('Future');
            const projected = lastSimulationData.simulated || {};
            const visibleRecent = series.visible.filter(item =>
                item.values.slice(start).some(value => Number.isFinite(toNumber(value))) ||
                Number.isFinite(toNumber(projected[item.name]))
            );

            trendChart.data.labels = labels;
            trendChart.data.datasets = visibleRecent.map((item, idx) => ({
                label: item.name,
                data: item.values.slice(start).concat(toNumber(projected[item.name])),
                backgroundColor: item.type === 'minor' ? 'rgba(100, 116, 139, 0.65)' : SERIES_COLORS[idx % SERIES_COLORS.length],
                borderColor: 'rgba(15, 23, 42, 0.45)',
                borderWidth: 1,
                borderRadius: 2
            }));
            trendChart.update();

            renderProjectionChart();

            const mainCount = series.decorated.filter(item => item.type === 'main').length;
            const minorCount = series.decorated.length - mainCount;
            const modeText = trendView === 'main' ? '주요 정당 중심' : trendView === 'minor' ? '소수·기타 항목' : '전체 항목';
            document.getElementById('trendSummary').innerText = `${modeText} · 최근 ${Math.min(RECENT_POINTS, allDates.length)}개 날짜 · 표시 ${visibleRecent.length}개 · 숨김 ${trendView === 'main' ? minorCount : trendView === 'minor' ? mainCount : 0}개`;
        }

        async function runSimulation(triggerType) {
            if (triggerType !== 'btn') lastActiveType = triggerType;

            const reg = document.getElementById('regSelect').value;
            const age = document.getElementById('ageSelect').value;
            const gen = document.getElementById('genSelect').value;
            
            // 지능형 세그먼트 결정: 마지막으로 변경된 카테고리를 우선 분석
            let segment = "전국";
            if (lastActiveType === 'region') segment = reg;
            else if (lastActiveType === 'age' && age) segment = age;
            else if (lastActiveType === 'gender' && gen) segment = gen;

            document.getElementById('trendTargetName').innerText = segment;
            const impact = document.getElementById('impactSlider').value / 100;
            const safeSegment = encodeURIComponent(segment);

            try {
                log(`Analyzing <b>${segment}</b>...`);
                
                const tResp = await fetch(`/api/trends?segment=${safeSegment}`);
                const tData = await tResp.json();
                if (tData.error) throw new Error(tData.error);

                const sResp = await fetch(`/api/simulate?segment=${safeSegment}&impact=${impact}`);
                const sData = await sResp.json();
                if (sData.error) throw new Error(sData.error);
                lastTrendData = tData;
                lastSimulationData = sData;

                // UI 갱신 (데이터 존재 여부 확인)
                if (!sData.original || !sData.simulated) throw new Error("Incomplete data received");

                renderTrendChart();

                const mList = document.getElementById('momentumList');
                mList.innerHTML = "";
                Object.keys(sData.momentum).forEach(name => {
                    const v = sData.momentum[name];
                    mList.innerHTML += `<div class="bg-white/5 p-4 rounded-xl flex flex-col gap-1 border border-white/5"><span class="text-[9px] font-bold text-slate-500 uppercase">${name}</span><span class="text-lg font-bold ${v > 0 ? 'text-green-400' : 'text-red-400'}">${v > 0 ? '+' : ''}${v}%</span></div>`;
                });
                log(`Success: ${segment} analysis updated.`);
            } catch (e) { log(`Error: ${e.message}`, true); }
        }
        window.onload = init;
    </script>
</body>
</html>
